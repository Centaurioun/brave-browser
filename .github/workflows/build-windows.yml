name: Build Brave Browser for Windows

on:
  push:
    branches:
      - 'retier-deepseek-model'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        run: npm install

      # --- THIS IS THE NEW, CRITICAL STEP FOR WINDOWS ---
      - name: Set up build environment
        run: npm run setup

      - name: Initialize build environment (npm run init)
        run: npm run init
        timeout-minutes: 180

      - name: Apply custom file patches
        run: |
          echo "Applying custom file modifications..."
          copy .github\patches\components\ai_chat\core\browser\model_service.cc src\brave\components\ai_chat\core\browser\
          copy .github\patches\browser\ai_chat\ai_chat_settings_helper.cc src\brave\browser\ai_chat\
          copy .github\patches\components\ai_chat_ui\strings\ai_chat_ui_strings.grdp src\brave\components\ai_chat_ui\strings\
        shell: cmd

      - name: Build Brave Browser (npm run build)
        run: npm run build -- --target=Brave-Browser-x64
        timeout-minutes: 180

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: brave-browser-windows-x64
          path: src/out/Brave-Browser-x64/